name: Update AI News Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore data state
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare OPML (optional)
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          else
            echo "No FOLLOW_OPML_B64 secret provided; RSS OPML is optional"
          fi

      - name: Update data
        run: pnpm run fetch

      - name: Snapshot articles + summaries
        run: pnpm snapshot
        continue-on-error: true

      - name: Publish data snapshot
        run: |
          cd data
          git config user.name "github-actions-bot"
          git config user.email "41898282+github-actions-bot@users.noreply.github.com"
          git checkout --orphan data-next
          git add -A
          git commit -m "data: snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force origin HEAD:data

      - name: Generate OPML JSON
        run: npx tsx src/generate-opml-json.ts

      - name: Build web
        env:
          GITHUB_PAGES: true
        run: |
          cd web
          pnpm install
          pnpm run build
          mkdir -p dist/data
          cp ../data/latest-24h.json dist/data/
          cp ../data/latest-7d.json dist/data/
          cp ../data/source-status.json dist/data/
          cp ../data/opml-feeds.json dist/data/ 2>/dev/null || true
          cp -r ../data/articles dist/data/articles 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
